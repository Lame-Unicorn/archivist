    - "Renmin University"
    - "中国人民大学"

  # 白名单关键词 (标题或摘要必须至少命中一个才能通过筛选)
  # 严格限定为推荐系统/相关核心方向，不要过宽
  required_keywords:
    # 推荐系统核心
    - "recommendation system"
    - "recommender system"
    - "recommender"
    - "sequential recommendation"
    - "generative recommendation"
    - "generative retrieval"
    - "collaborative filtering"
    - "CTR prediction"
    - "click-through rate"
    - "CVR prediction"
    - "next item prediction"
    - "session-based recommendation"
    - "user behavior model"
    - "behavior sequence"
    - "feature interaction"
    - "two-tower"
    - "embedding table"
    - "scaling law"
    - "industrial recommendation"
    - "large-scale recommendation"
    - "billion parameter"
    # Semantic ID 相关
    - "semantic id"
    - "semantic identifier"
    - "RQ-VAE"
    - "vector quantization"
    # 推荐相关 LLM 技术
    - "LLM-based recommend"
    - "LLM4Rec"
    - "conversational recommendation"
    - "explainable recommendation"
    # 信息检索（与推荐相邻）
    - "listwise reranking"
    - "passage ranking"
    - "dense retrieval"

  # 评分权重
  rec_keyword_score: 3.0        # 命中推荐关键词的基础分
  llm_keyword_score: 2.0        # 命中通用LLM关键词的基础分
  ab_test_bonus: 2.0            # 摘要中提及在线实验加分
  industry_author_bonus: 1.5    # 有工业界作者加分
  blocked_penalty: -100.0       # 屏蔽机构惩罚
  pass_threshold: 2.0           # 通过筛选的最低分数

