# ── Project & Deploy ──────────────────────────────────────────
project:
  # All paths default to the directory containing this config.yaml.
  # `archive_dir` is relative to the project root unless absolute.
  archive_dir: archive

site:
  # Public URL where the deployed site is served. Used to absolutize
  # relative links in Lark push messages. User-specific — override in
  # config.local.yaml. Leave empty to disable.
  base_url: ""

deploy:
  # SSH target for `archivist deploy`. Format: user@host
  # User-specific — override in config.local.yaml. Leave empty to disable;
  # pass --host on the CLI to override per-invocation.
  host: ""
  # Remote paths (tilde expansion happens on the remote shell, NOT locally).
  remote_site_path: "~/site"
  remote_archive_path: "~/archive"

lark:
  # Open ID of the Lark user that receives digest notifications + pinned msgs.
  # Discover with: lark-cli contact +get-user
  # User-specific — override in config.local.yaml. Leave empty to disable.
  notify_user_id: ""


# ── ArXiv fetching & scoring ──────────────────────────────────
arxiv:
  # 抓取的 Arxiv 类目
  categories:
    - "cs.IR"    # Information Retrieval
    - "cs.CL"    # Computation and Language
    - "cs.LG"    # Machine Learning
    - "cs.AI"    # Artificial Intelligence
  max_results_per_category: 100
  top_k_deep_read: 6
  deep_read_threshold: 7  # Min score to enter deep reading (4-6 → brief archive only)

scoring:
  # 推荐系统关键词 (标题/摘要匹配, 命中即加分)
  rec_keywords:
    # 生成式推荐
    - "generative recommendation"
    - "generative collaborative filtering"
    - "diffusion recommendation"
    - "diffusion for recommendation"
    - "sequential recommendation"
    - "collaborative filtering"
    - "click-through rate"
    - "CTR prediction"
    - "conversion rate"
    - "user behavior modeling"
    - "item recommendation"
    - "next item prediction"
    - "knowledge graph recommendation"
    - "graph neural network recommendation"
    - "session-based recommendation"
    - "multi-task learning recommendation"
    # 判别式推荐 scaling
    - "scaling law"
    - "scaling recommendation"
    - "large-scale recommendation"
    - "billion parameter"
    - "industrial recommendation"
    - "deep learning recommendation"
    - "feature interaction"
    - "embedding table"
    - "two-tower"
    - "multi-task learning"
    - "deep interest"
    - "behavior sequence"

  # 通用 LLM 技术关键词 (泛用性强的技术)
  llm_general_keywords:
    - "attention mechanism"
    - "gated attention"
    - "attention residual"
    - "transformer architecture"
    - "GRPO"
    - "reinforcement learning from human feedback"
    - "RLHF"
    - "DPO"
    - "mixture of experts"
    - "MoE"
    - "parameter efficient"
    - "LoRA"
    - "quantization"
    - "speculative decoding"
    - "long context"
    - "retrieval augmented generation"
    - "RAG"
    - "chain of thought"
    - "tool use"
    - "function calling"
    - "multi-modal"
    - "vision language model"

  # 工业界机构 (作者所属机构包含这些关键词则加分)
