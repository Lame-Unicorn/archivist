<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Archivist{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ css_version }}">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ],
            throwOnError: false
        });"></script>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">Archivist</a>
            <nav class="nav">
                <a href="/reading/" class="nav-link {% if request.path.startswith('/reading') %}active{% endif %}">Paper Reading</a>
                <a href="/graph/" class="nav-link {% if request.path.startswith('/graph') %}active{% endif %}">Model Graph</a>
                <a href="/benchmark/" class="nav-link {% if request.path.startswith('/benchmark') %}active{% endif %}">Benchmarks</a>
                <a href="#" class="nav-link disabled">Chat</a>
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
